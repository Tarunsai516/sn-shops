# ===== Server =====
server.port=8080

# ===== Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/snshops_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:enter_your_password_here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=c25zaG9wcy1zZWNyZXQta2V5LXdoaWNoLWlzLXZlcnktbG9uZy1hbmQtc2VjdXJlLWZvci1oczUxMi1hbGdvcml0aG0=
app.jwt.expiration-ms=86400000

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
